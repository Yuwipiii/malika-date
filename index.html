<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#6c348d">
  <meta name="description" content="Приглашение для Малики на свидание 11 июля 2026 года.">
  <title>Наш особенный вечер 💜</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="invitation">
    <div class="corner corner-left" aria-hidden="true"></div>
    <div class="corner corner-right" aria-hidden="true"></div>

    <div class="heart-garland" aria-hidden="true">
      <span>♥</span><span>♥</span><span>♥</span><span>♥</span><span>♥</span><span>♥</span><span>♥</span>
    </div>

    <header class="heading">
      <p class="pretitle">ПРИГЛАШЕНИЕ НА</p>
      <h1>Наш особенный<br><em>вечер</em></h1>
    </header>

    <section class="photo-zone" aria-label="Место для общей фотографии">
      <span class="side-heart side-heart-one" aria-hidden="true">♥</span>
      <span class="side-heart side-heart-two" aria-hidden="true">♥</span>
      <span class="side-heart side-heart-three" aria-hidden="true">♥</span>
      <span class="side-heart side-heart-four" aria-hidden="true">♥</span>

      <div class="photo-heart">
        <div class="photo-inner">
          <img id="couplePhoto" src="our_photo.jpg" alt="Наша фотография">
          <div class="photo-placeholder" id="photoPlaceholder">
            <span>♡</span>
            <strong>Здесь будет<br>наша фотография</strong>
          </div>
        </div>
      </div>
    </section>

    <section class="event-details">
      <strong>СУББОТА, 11 ИЮЛЯ&nbsp; | &nbsp;19:00</strong>
      <span>Kölökö · Бишкек</span>
      <p>Давай проведём этот вечер вместе<br>и создадим ещё одно красивое воспоминание.</p>
    </section>

    <section class="answer-section">
      <p>Ты пойдёшь со мной?</p>
      <div class="answer-buttons" id="answerButtons">
        <button class="no-button" id="noButton" type="button">Нет</button>
        <button class="yes-button" id="yesButton" type="button">Да, конечно 💜</button>
      </div>
      <div class="yes-result" id="yesResult" hidden>
        <span>♥</span>
        <strong>Тогда это свидание!</strong>
        <small>До встречи 11 июля в 19:00</small>
      </div>
    </section>
  </main>

  <div class="meme-modal" id="memeModal" role="dialog" aria-modal="true" aria-label="Ответ на кнопку Нет" hidden>
    <button class="modal-close" id="modalClose" type="button" aria-label="Закрыть">×</button>
    <div class="meme-frame">
      <img id="memeImage" src="meme_cat.jpg" alt="Мем с котиком">
    </div>
  </div>

  <div class="heart-particles" id="heartParticles" aria-hidden="true"></div>
  <script src="script.js"></script>
</body>
</html>
