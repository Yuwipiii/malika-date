<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#6c348d">
  <meta name="description" content="Приглашение для Малики на свидание 11 июля 2026 года.">
  <title>Наш особенный вечер 💜</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Unbounded:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="invitation">
    <div class="corner corner-left" aria-hidden="true"></div>
    <div class="corner corner-right" aria-hidden="true"></div>

    <div class="heart-garland" aria-hidden="true">
      <img src="heart.svg" alt=""><img src="heart.svg" alt=""><img src="heart.svg" alt=""><img src="heart.svg" alt=""><img src="heart.svg" alt=""><img src="heart.svg" alt=""><img src="heart.svg" alt="">
    </div>

    <header class="heading">
      <h1>Приглашение<br>на свидание</h1>
    </header>

    <section class="photo-zone" aria-label="Место для общей фотографии">
      <img class="side-heart side-heart-one" src="heart.svg" alt="" aria-hidden="true">
      <img class="side-heart side-heart-two" src="heart.svg" alt="" aria-hidden="true">
      <img class="side-heart side-heart-three" src="heart.svg" alt="" aria-hidden="true">
      <img class="side-heart side-heart-four" src="heart.svg" alt="" aria-hidden="true">

      <div class="photo-heart">
        <div class="photo-inner">
          <img id="couplePhoto" src="our_photo.jpg" alt="Наша фотография">
          <div class="photo-placeholder" id="photoPlaceholder">
            <span>♡</span>
            <strong>Здесь будет<br>наша фотография</strong>
          </div>
        </div>
      </div>
    </section>

    <section class="event-details">
      <div class="event-row">
        <small>ВРЕМЯ И МЕСТО</small>
        <strong>11 июля · 19:00</strong>
        <span>Kölökö · Бишкек</span>
      </div>
      <div class="program-row">
        <small>ПРОГРАММА ВЕЧЕРА</small>
        <ul>
          <li>Ушаки</li>
          <li>Хорошая еда</li>
          <li>Будем дурачиться</li>
        </ul>
      </div>
    </section>

    <section class="answer-section">
      <p>Ты пойдёшь со мной?</p>
      <div class="answer-buttons" id="answerButtons">
        <button class="no-button" id="noButton" type="button">Нет</button>
        <button class="yes-button" id="yesButton" type="button">Да, конечно 💜</button>
      </div>
    </section>
  </main>

  <div class="meme-modal" id="memeModal" role="dialog" aria-modal="true" aria-label="Ответ на кнопку Нет" hidden>
    <button class="modal-close" id="modalClose" type="button" aria-label="Закрыть">×</button>
    <div class="meme-frame">
      <img id="memeImage" src="cat_meme.jpg" alt="Мем с котиком">
    </div>
  </div>

  <div class="heart-particles" id="heartParticles" aria-hidden="true"></div>
  <script src="script.js"></script>
</body>
</html>
